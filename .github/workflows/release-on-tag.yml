name: Release Build

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    name: Build Windows and Create Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore Sotaj.sln

      - name: Build
        run: dotnet build Sotaj/Sotaj.csproj -c Release --no-restore

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish (self-contained single-file for win-x64)
        run: |
          dotnet publish Sotaj/Sotaj.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: Ensure exe is named Sotaj.exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path ./publish -Filter *.exe | Select-Object -First 1
          if ($null -eq $exe) { Write-Host 'No exe found in publish folder'; exit 1 }
          if ($exe.Name -ne 'Sotaj.exe') {
            Rename-Item -Path $exe.FullName -NewName 'Sotaj.exe' -Force
          }

      - name: Install Velopack (dotnet tool)
        run: dotnet tool install -g vpk

      - name: Add dotnet tools to PATH
        shell: pwsh
        run: |
          $toolsPath = "$env:USERPROFILE\.dotnet\tools"
          Add-Content -Path $env:GITHUB_PATH -Value $toolsPath

      - name: Create Velopack installer
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -Force Releases
          # -u expects a NuGet package id (alphanumeric/dash/underscore/dot)
          $packageId = "Sotaj"
          # exe name inside publish folder (adjust if different)
          $exeName = "Sotaj.exe"
          # icon (optional) - keep if present in repo
          $icon = "Sotaj/Assets/Sotaj.ico"
          # call vpk (Velopack) to create installer
          vpk pack -u $packageId -v $env:VERSION -p ./publish -e $exeName -o ./Releases --icon $icon
          # ensure version is included in installer file names
          Get-ChildItem -Path ./Releases -Filter *.exe | ForEach-Object {
            if ($_.Name -notmatch [regex]::Escape($env:VERSION)) {
              $newName = $_.Name.Replace("-setup", "-$env:VERSION-win-setup")
              Rename-Item -Path $_.FullName -NewName $newName -Force
            }
          }

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            Releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN || secrets.GITHUB_TOKEN }}
